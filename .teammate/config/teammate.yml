# Teammate Configuration
version: "0.0.1"

# =============================================================================
# LIFECYCLE PHASES
# =============================================================================
# Configure which phases are required vs optional for your workflow

lifecycle:
  foundation:
    init:
      required: true
      description: "Initialize or audit project foundation (project-context + principles)"
      output: "project-context.md + principles.md"

  per_feature:
    align:
      required: true
      description: "Define what to build (Impact Mapping + Example Mapping)"
      output: "spec.md + example-mapping.md"
    plan:
      required: true
      description: "Generate scenarios and unified implementation plan (UI deep analysis auto-triggered)"
      output: ".feature + plan.md + contracts/ui/ui-spec.md (if UI)"
    execute:
      required: true
      description: "Execute actions using Red-Green-Refactor-Reflect Loop"
    review:
      required: true
      description: "Behavioral coverage + requirements quality + feature readiness"
      output: "checklists/feature-readiness.md"

# =============================================================================
# GHERKIN SETTINGS
# =============================================================================

gherkin:
  # Default language for feature files
  language: en

  # Tag conventions
  tags:
    priority:
      - "@P1"  # Critical - MVP
      - "@P2"  # Important - Release
      - "@P3"  # Nice-to-have - Deferred
    
    category:
      - "@happy-path"
      - "@alternative"
      - "@negative"
      - "@boundary"
      - "@data-driven"
      - "@principles"
    
    status:
      - "@wip"
      - "@manual"
      - "@slow"
      - "@flaky"

  # Scenario naming conventions
  naming:
    pattern: "Sentence case with context"
    max_length: 120
    
  # Step definition settings
  step_definitions:
    language: typescript  # or: javascript, python, ruby, java
    location: "tests/step-definitions"

# =============================================================================
# VERIFICATION SETTINGS
# =============================================================================

verification:
  # Coverage thresholds
  coverage:
    minimum_scenario_coverage: 80  # Percentage of scenarios that must pass
    require_happy_path: true       # All @happy-path scenarios must pass
    require_principles: true       # All @principles scenarios must pass

  # Living documentation output
  living_docs:
    enabled: true
    format: html  # or: markdown, json
    output_dir: "docs/living-documentation"
    include_pending: true

  # Traceability requirements
  traceability:
    require_scenario_to_action: true   # Each action must reference a scenario
    require_action_to_task: true      # Each task must have actions

# =============================================================================
# FEATURE DIRECTORY STRUCTURE
# =============================================================================

feature_structure:
  base_dir: "features"
  
  # Files generated per feature
  files:
    - spec.md              # teammate.align output (spec)
    - example-mapping.md   # teammate.align output (examples)
    - teammate.refs.yaml   # Context anchors
    - plan.md              # teammate.plan output (Part 1: Tasks + Part 2: Actions)
    - insights.md          # teammate.execute output (REFLECT dynamic cheatsheet)
    - README.md            # Feature overview
  
  # Subdirectories per feature
  directories:
    scenarios: "scenarios"    # .feature files (Gherkin scenarios)
    contracts:
      api: "contracts/api"    # OpenAPI specs
      ui: "contracts/ui"      # UI mockups
      ai: "contracts/ai"      # Prompt contracts
    checklists: "checklists"  # Verification checklists

# =============================================================================
# DOCS SETTINGS (External Reference Knowledge Base)
# =============================================================================

docs:
  location: "docs"
  
  # llms.txt standard — index file for LLM-friendly reference discovery
  llms_txt:
    enabled: true
    root: "docs/llms.txt"
  
  # Subdirectory conventions
  directories:
    design: "docs/design"           # Design system docs, Figma index
    # Add per-library directories as needed:
    # fubon_neo: "docs/fubon-neo"

# =============================================================================
# MEMORY SETTINGS
# =============================================================================

memory:
  location: ".teammate/memory"
  
  files:
    principles: "principles.md"
    project_context: "project-context.md"
    active_context: "active-context.md"
    progress: "progress.md"

  # Auto-update settings
  auto_update:
    active_context: true   # Update on each command
    progress: true         # Update on phase completion

# =============================================================================
# SCRIPT SETTINGS
# =============================================================================

scripts:
  location: ".teammate/scripts/bash"
  
  # Script execution preferences
  shell: "/bin/bash"
  json_output: true

# =============================================================================
# SNAPSHOT SETTINGS
# =============================================================================

snapshots:
  enabled: false
  location: ".teammate/snapshots"
  
  # When to capture snapshots
  triggers:
    - on_phase_complete
    - on_verification_pass
  
  # What to include in snapshots
  include:
    - feature_files
    - living_docs
    - coverage_reports
